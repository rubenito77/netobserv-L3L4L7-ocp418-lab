---
# NOTA DE LAB: Usamos MinIO como object store local para no depender de S3 externo.
# Para producción: reemplazar con credenciales reales de S3/ODF.
apiVersion: v1
kind: Namespace
metadata:
  name: minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: quay.io/minio/minio:latest
        args:
        - server
        - /data
        - --console-address
        - ":9001"
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio
spec:
  selector:
    app: minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001
---
# Job que crea el bucket "loki" en MinIO al arrancar
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: minio
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-minio
        image: busybox
        command: ['sh', '-c', 'until nc -z minio 9000; do echo waiting for minio; sleep 2; done']
      containers:
      - name: mc
        image: quay.io/minio/mc:latest
        env:
        - name: HOME
          value: /tmp
        command:
        - sh
        - -c
        - |
          set -e
          mc alias set local http://minio:9000 minioadmin minioadmin
          mc mb --ignore-existing local/loki
          mc ls local/loki
          echo "Bucket loki creado OK"
